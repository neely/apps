<title>Queue — Media Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
  :root {
    --bg: #0e0e10;
    --surface: #19191e;
    --surface2: #222229;
    --border: #2e2e38;
    --accent-books: #e8c547;
    --accent-movies: #e8574a;
    --accent-tv: #4ab8e8;
    --accent-games: #7ed87e;
    --text: #f0efea;
    --muted: #6e6e80;
    --grain-opacity: 0.035;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 0 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: var(--grain-opacity);
    pointer-events: none;
    z-index: 1000;
  }

  /* Header */
  header {
    padding: 32px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 12vw, 64px);
    letter-spacing: 0.04em;
    line-height: 1;
    background: linear-gradient(135deg, var(--text) 0%, #888 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    padding-bottom: 6px;
  }

  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-icon:hover { color: var(--text); border-color: var(--muted); }

  /* Main content */
  main { padding: 24px 16px 0; display: flex; flex-direction: column; gap: 24px; }

  /* Category section */
  .category {
    background: var(--surface);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .cat-header::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0 2px 2px 0;
  }
  .books .cat-header::before { background: var(--accent-books); }
  .movies .cat-header::before { background: var(--accent-movies); }
  .tv .cat-header::before { background: var(--accent-tv); }

  .cat-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.08em;
  }
  .books .cat-label { color: var(--accent-books); }
  .movies .cat-label { color: var(--accent-movies); }
  .tv .cat-label { color: var(--accent-tv); }
  .games .cat-label { color: var(--accent-games); }
  .games .cat-header::before { background: var(--accent-games); }
  .games .item-checkbox:hover { border-color: var(--accent-games); }

  .cat-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cat-count {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border-radius: 20px;
    padding: 3px 8px;
    letter-spacing: 0.02em;
  }

  .cat-chevron {
    color: var(--muted);
    font-size: 14px;
    transition: transform 0.2s;
  }
  .cat-chevron.open { transform: rotate(180deg); }

  /* List items */
  .item-list { padding: 8px; display: flex; flex-direction: column; gap: 4px; }

  .item {
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid transparent;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 10px 10px 12px;
    transition: border-color 0.15s, opacity 0.15s;
    position: relative;
  }
  .item:hover { border-color: var(--border); }
  .item.sortable-chosen { opacity: 0.5; }
  .item.sortable-ghost { opacity: 0.3; border-style: dashed; border-color: var(--muted); }

  /* Drag handle — double lines */
  .drag-handle {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 6px 4px;
    cursor: grab;
    flex-shrink: 0;
    touch-action: none;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle span {
    display: block;
    width: 18px;
    height: 2px;
    background: var(--muted);
    border-radius: 1px;
  }
  .drag-handle:hover span { background: #888; }

  /* Item content */
  .item-content { flex: 1; min-width: 0; }

  .item-title {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .item-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Move arrows (fallback for small screens) */
  .item-actions {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
  }

  .btn-move {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 3px 6px;
    font-size: 13px;
    line-height: 1;
    border-radius: 4px;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.1s, background 0.1s;
  }
  .btn-move:hover { color: var(--text); background: var(--border); }

  .btn-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 6px;
    font-size: 14px;
    line-height: 1;
    border-radius: 4px;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.15s;
  }
  .btn-delete:hover { color: #e8574a; }

  /* Show more / less */
  .show-more-row {
    padding: 6px 8px 10px;
    text-align: center;
  }

  .btn-show-more {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-show-more:hover { color: var(--text); border-color: var(--muted); }

  /* Add item form */
  .add-form {
    padding: 8px 8px 10px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .add-row { display: flex; gap: 6px; }

  .add-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 300;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
    -webkit-appearance: none;
  }
  .add-input:focus { border-color: var(--muted); }
  .add-input::placeholder { color: var(--muted); }

  .btn-add {
    background: var(--text);
    border: none;
    border-radius: 8px;
    color: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    font-weight: 300;
    padding: 0 14px;
    cursor: pointer;
    transition: opacity 0.15s;
    flex-shrink: 0;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-add:hover { opacity: 0.85; }

  .series-toggle {
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    letter-spacing: 0.02em;
    padding: 0 2px;
  }
  .series-toggle:hover { color: var(--text); }

  .series-row {
    display: none;
    gap: 6px;
  }
  .series-row.visible { display: flex; }

  /* Done badge */
  .badge-done {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* Completed items */
  .item.done .item-title { text-decoration: line-through; color: var(--muted); }

  .item-checkbox {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    padding: 0;
  }
  .item.done .item-checkbox {
    background: var(--muted);
    border-color: var(--muted);
  }
  .item-checkbox::after {
    content: '✓';
    font-size: 10px;
    color: var(--bg);
    display: none;
  }
  .item.done .item-checkbox::after { display: block; }
  .books .item-checkbox:hover { border-color: var(--accent-books); }
  .movies .item-checkbox:hover { border-color: var(--accent-movies); }
  .tv .item-checkbox:hover { border-color: var(--accent-tv); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 18px 12px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.03em;
    font-style: italic;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 900;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">Queue</div>
  <div class="header-actions">
    <button class="btn-icon" onclick="doExport()">Export</button>
    <button class="btn-icon" onclick="doImport()">Import</button>
  </div>
</header>

<main id="main"></main>

<div class="toast" id="toast"></div>

<script>
// ─── Data ───────────────────────────────────────────────────────────────────
const CATEGORIES = [
  { id: 'books',  label: 'Books',    accent: '#e8c547', placeholder: 'Add a book…' },
  { id: 'movies', label: 'Movies',   accent: '#e8574a', placeholder: 'Add a movie…' },
  { id: 'tv',     label: 'TV Shows', accent: '#4ab8e8', placeholder: 'Add a show…' },
  { id: 'games',  label: 'Games',    accent: '#7ed87e', placeholder: 'Add a game…' },
];

const DEFAULT_SHOW = 3;

function loadData() {
  try {
    const raw = localStorage.getItem('queue-data');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    books:  [],
    movies: [],
    tv:     [],
    games:  [],
  };
}

function saveData() {
  try {
    localStorage.setItem('queue-data', JSON.stringify(state));
  } catch(e) {}
}

let state = loadData();

// collapsed/expanded per category (default: expanded)
let expanded = { books: true, movies: true, tv: true };
// show-all state
let showAll = { books: false, movies: false, tv: false };

// ─── Render ─────────────────────────────────────────────────────────────────
function render() {
  saveData();
  const main = document.getElementById('main');
  main.innerHTML = '';
  CATEGORIES.forEach(cat => main.appendChild(renderCategory(cat)));
  attachSortable();
}

function renderCategory(cat) {
  const items = state[cat.id];
  const isExpanded = expanded[cat.id];
  const isShowAll = showAll[cat.id];
  const visible = isShowAll ? items : items.slice(0, DEFAULT_SHOW);
  const hasMore = items.length > DEFAULT_SHOW;

  const section = document.createElement('div');
  section.className = `category ${cat.id}`;
  section.dataset.cat = cat.id;

  // Header
  const header = document.createElement('div');
  header.className = 'cat-header';
  header.innerHTML = `
    <span class="cat-label">${cat.label}</span>
    <div class="cat-meta">
      <span class="cat-count">${items.length}</span>
      <span class="cat-chevron ${isExpanded ? 'open' : ''}">▾</span>
    </div>
  `;
  header.addEventListener('click', () => {
    expanded[cat.id] = !expanded[cat.id];
    render();
  });
  section.appendChild(header);

  if (!isExpanded) return section;

  // List
  const list = document.createElement('div');
  list.className = 'item-list';
  list.dataset.cat = cat.id;
  list.id = `list-${cat.id}`;

  if (items.length === 0) {
    list.innerHTML = `<div class="empty-state">Nothing queued yet.</div>`;
  } else {
    visible.forEach((item, visIdx) => {
      const realIdx = isShowAll ? visIdx : visIdx; // index in visible = index in slice
      // We need the real index in the full array
      const trueIdx = items.indexOf(item);
      list.appendChild(renderItem(item, trueIdx, cat));
    });
  }
  section.appendChild(list);

  // Show more row
  if (hasMore) {
    const row = document.createElement('div');
    row.className = 'show-more-row';
    row.innerHTML = `<button class="btn-show-more">${isShowAll ? `▴ Show less` : `▾ Show all ${items.length}`}</button>`;
    row.querySelector('button').addEventListener('click', () => {
      showAll[cat.id] = !showAll[cat.id];
      render();
    });
    section.appendChild(row);
  }

  // Add form
  section.appendChild(renderAddForm(cat));

  return section;
}

function renderItem(item, idx, cat) {
  const div = document.createElement('div');
  div.className = `item${item.done ? ' done' : ''}`;
  div.dataset.idx = idx;

  div.innerHTML = `
    <div class="drag-handle" title="Drag to reorder">
      <span></span><span></span>
    </div>
    <button class="item-checkbox" title="Mark done"></button>
    <div class="item-content">
      <div class="item-title">${escHtml(item.title)}</div>
      ${item.series ? `<div class="item-sub">${escHtml(item.series)}</div>` : ''}
    </div>
    <div class="item-actions">
      <button class="btn-move" title="Move up" data-dir="up">▲</button>
      <button class="btn-move" title="Move down" data-dir="down">▼</button>
    </div>
    <button class="btn-delete" title="Remove">✕</button>
  `;

  div.querySelector('.item-checkbox').addEventListener('click', () => {
    state[cat.id][idx].done = !state[cat.id][idx].done;
    render();
  });

  div.querySelector('.btn-delete').addEventListener('click', () => {
    state[cat.id].splice(idx, 1);
    render();
  });

  div.querySelectorAll('.btn-move').forEach(btn => {
    btn.addEventListener('click', () => {
      const dir = btn.dataset.dir;
      const arr = state[cat.id];
      if (dir === 'up' && idx > 0) {
        [arr[idx-1], arr[idx]] = [arr[idx], arr[idx-1]];
      } else if (dir === 'down' && idx < arr.length - 1) {
        [arr[idx], arr[idx+1]] = [arr[idx+1], arr[idx]];
      }
      render();
    });
  });

  return div;
}

function renderAddForm(cat) {
  const form = document.createElement('div');
  form.className = 'add-form';

  const hasSeries = cat.id === 'books';

  form.innerHTML = `
    <div class="add-row">
      <input class="add-input" id="input-${cat.id}" placeholder="${cat.placeholder}" type="text" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn-add" title="Add">+</button>
    </div>
    ${hasSeries ? `
    <span class="series-toggle" id="toggle-series-${cat.id}">＋ Add series / progress</span>
    <div class="series-row" id="series-row-${cat.id}">
      <input class="add-input" id="series-${cat.id}" placeholder="e.g. Wheel of Time — Book 3 of 14" type="text" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>` : ''}
  `;

  const titleInput = form.querySelector(`#input-${cat.id}`);
  const btn = form.querySelector('.btn-add');

  function doAdd() {
    const title = titleInput.value.trim();
    if (!title) return;
    const seriesEl = document.getElementById(`series-${cat.id}`);
    const series = seriesEl ? seriesEl.value.trim() : '';
    state[cat.id].push({ title, series, done: false });
    if (state[cat.id].length > DEFAULT_SHOW) showAll[cat.id] = true;
    render();
    // Re-focus after render
    setTimeout(() => {
      const el = document.getElementById(`input-${cat.id}`);
      if (el) el.focus();
    }, 50);
  }

  titleInput.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });
  btn.addEventListener('click', doAdd);

  if (hasSeries) {
    const toggle = form.querySelector(`#toggle-series-${cat.id}`);
    if (toggle) {
      toggle.addEventListener('click', () => {
        const row = document.getElementById(`series-row-${cat.id}`);
        if (row) {
          row.classList.toggle('visible');
          toggle.textContent = row.classList.contains('visible') ? '－ Hide series field' : '＋ Add series / progress';
        }
      });
    }
  }

  return form;
}

// ─── Sortable ────────────────────────────────────────────────────────────────
function attachSortable() {
  CATEGORIES.forEach(cat => {
    const el = document.getElementById(`list-${cat.id}`);
    if (!el) return;
    Sortable.create(el, {
      handle: '.drag-handle',
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd(evt) {
        const arr = state[cat.id];
        const isShowAll = showAll[cat.id];
        const from = evt.oldIndex;
        const to = evt.newIndex;
        if (from === to) return;
        // Indices are within the visible slice if not showAll
        if (!isShowAll) {
          // Clamp to slice
          const item = arr.splice(from, 1)[0];
          arr.splice(to, 0, item);
        } else {
          const item = arr.splice(from, 1)[0];
          arr.splice(to, 0, item);
        }
        render();
      }
    });
  });
}

// ─── Export (file download) ───────────────────────────────────────────────────
function doExport() {
  const date = new Date().toISOString().slice(0, 10);
  const filename = `queue-${date}.json`;
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast(`Saved ${filename}`);
}

// ─── Import (file picker) ─────────────────────────────────────────────────────
function doImport() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.addEventListener('change', () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (parsed.books !== undefined || parsed.movies !== undefined || parsed.tv !== undefined) {
          state = {
            books: parsed.books || [],
            movies: parsed.movies || [],
            tv: parsed.tv || [],
            games: parsed.games || [],
          };
          saveData();
          render();
          showToast('Queue restored!');
        } else {
          showToast('Invalid file — not a Queue backup.');
        }
      } catch(err) {
        showToast('Could not read file — try again.');
      }
    };
    reader.readAsText(file);
  });
  input.click();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
}

// ─── Toast ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
